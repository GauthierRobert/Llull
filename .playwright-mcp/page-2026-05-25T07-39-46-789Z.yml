    - button "Duplicate an entity into a linear pattern. Creates count-1 new copies spaced by offset (a world-space vector [dx,dy,dz]). The original stays at instance 0; copy k is placed at original.position + k*offset (k = 1..count-1). count must be an integer >= 2." [ref=e12] [cursor=pointer]: Array Linear
    - button "Duplicate an entity into a polar (circular) pattern around the Z axis through center. The original counts as instance 0; count-1 new copies are created. Copy k is rotated by k*(angle/count) radians around center (XY plane). angle defaults to 2*PI (full circle). Each copy also has rotation[2] incremented by the same step so the part faces outward consistently. Z position and other rotation components are unchanged. count must be >= 2." [ref=e13] [cursor=pointer]: Array Polar
    - button "Draw a straight line segment defined by start and end points in the local 2D work plane. position places the work-plane origin in 3D space (default [0,0,0])." [ref=e14] [cursor=pointer]: Draw Line
    - button "Draw a connected sequence of line segments through an ordered list of 2D points in the local work plane. Requires at least 2 points. When closed=true the last point connects back to the first. A closed polyline can be fed to extrude_sketch to become a 3D solid." [ref=e15] [cursor=pointer]: Draw Polyline
    - button "Draw a circular arc in the local 2D work plane, defined by center, radius, and start/end angles in radians. Angles are measured counter-clockwise from the +X axis. radius must be > 0." [ref=e16] [cursor=pointer]: Draw Arc
    - button "Draw a full circle in the local 2D work plane, defined by center and radius. radius must be > 0." [ref=e17] [cursor=pointer]: Draw Circle
    - button "Draw an axis-aligned rectangle in the local 2D work plane. The origin is at the lower-left corner; width extends along +X, height along +Y. position places the work-plane origin in 3D space. Both width and height must be > 0." [ref=e18] [cursor=pointer]: Draw Rectangle
    - button "Place a point marker at the given 3D world position. The point entity has no local 2D geometry — its position is the point location." [ref=e19] [cursor=pointer]: Draw Point
    - 'button "Replace the current document with one parsed from a serialized JSON string produced by serializeDocument (envelope format: llull-document v1). On parse or validation failure the document is left unchanged." [ref=e20] [cursor=pointer]': Load Document
    - button "Extrude a closed 2D shape entity (circle, rectangle, or closed polyline) into a 3D extrusion solid. Keeps the source entity. depth must be > 0." [ref=e21] [cursor=pointer]: Extrude Sketch
    - 'button "PLANNED: revolve a closed 2D profile entity around the Y axis to produce a solid of revolution. Currently a stub — registers the tool name for UI/AI/MCP discovery but does not yet produce geometry (requires a surface-of-revolution kernel)." [ref=e22] [cursor=pointer]': Revolve Profile
    - button "Clone an existing entity to a new id, placing the copy at original.position + offset. Returns the new entity id in affected. Original is untouched." [ref=e23] [cursor=pointer]: Duplicate Entity
    - button "Create a named group containing >= 2 existing entities. The group id is returned in affected. Entities are not moved or changed." [ref=e24] [cursor=pointer]: Group Entities
    - button "Dissolve a group, removing it from the document. Member entities are NOT deleted; they remain in the document. Returns the freed member ids in affected." [ref=e25] [cursor=pointer]: Ungroup Entities
    - button "Merge two 3D solid entities into a single mesh entity using a CSG union operation. Both operand entities are consumed (removed) and replaced by the union mesh. Requires a geometry kernel to be injected (available after app initialization). Both operands must be 3D solids (box, cylinder, sphere, extrusion, or mesh)." [ref=e26] [cursor=pointer]: Boolean Union
    - 'button "Subtract the volume of 3D solid b from 3D solid a, producing a mesh entity. Order matters: result = a minus b. Both operand entities are consumed (removed) and replaced by the result mesh. Requires a geometry kernel to be injected. Both operands must be 3D solids (box, cylinder, sphere, extrusion, or mesh)." [ref=e27] [cursor=pointer]': Boolean Subtract
    - button "Compute the intersection of two 3D solid entities, producing a mesh entity that covers only the volume shared by both solids. Both operand entities are consumed (removed) and replaced by the intersection mesh. Requires a geometry kernel to be injected. Both operands must be 3D solids (box, cylinder, sphere, extrusion, or mesh)." [ref=e28] [cursor=pointer]: Boolean Intersect
